<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F5 自動化維運 - 登入</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-bg">
    <div class="glass-container login-box">
        <div class="logo-area">
            <div class="f5-icon"></div>
            <h1>F5 自動化維運</h1>
            <p>安全網路管理入口</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">帳號</label>
                <input type="text" id="username" name="username" placeholder="請輸入帳號" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" placeholder="請輸入密碼" required>
            </div>
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span>登入</span>
                <div class="loader" id="loginLoader" style="display: none;"></div>
            </button>
        </form>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
